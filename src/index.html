<!DOCTYPE html>
<html lang="en-US">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
        name="description"
        content="Kevin Pruett writes software and designs interfaces to amplify the human experience"
    />
    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="favicon.svg" />
    <link rel="mask-icon" href="mask-icon.svg" color="#000000" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <title>
        Kevin Pruett writes software and designs interfaces to amplify the human
        experience
    </title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
        rel="stylesheet"
    />
    <style>
        :root {
            --color-white: #fafafa;
            --color-gray: #aaa;
            --color-light-blue: #15beec;
            --color-blue: #009ec9;
            --color-slate: #222;
            --color-black: #141414;
            --background-color-light: var(--color-white);
            --background-color-dark: var(--color-black);
            --font-family: "Inter", -system-ui, -apple-system,
                BlinkMacSystemFont, segoe ui, Roboto, Helvetica, Arial,
                apple color emoji, segoe ui emoji, segoe ui symbol, sans-serif;
        }

        html {
            font-size: 62.5%;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--color-blue);
        }

        a:hover {
            color: var(--color-gray);
        }

        body {
            margin: 0;
            padding: 0;
            font-weight: 400;
            background-color: var(--background-color-light);
            color: var(--color-slate);
            font-family: var(--font-family);
            font-size: 1.6rem;
        }

        .kp path {
            fill: var(--color-slate);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr min(65ch, calc(100% - 4rem)) 1fr;
            grid-column-gap: 2rem;
        }

        .grid > * {
            grid-column: 2;
        }

        .kp {
            width: 100%;
            height: 100%;
        }

        main {
            font-size: 2.5rem;
            line-height: 1.4;
        }

        @media (prefers-color-scheme: dark) {
            a {
                color: var(--color-light-blue);
            }

            body {
                background: var(--background-color-dark);
                color: var(--color-white);
            }

            .kp path {
                fill: var(--color-white);
            }
        }

        ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

    </style>

    <body>
        <div class="grid">
            <header>
                <svg
                    role="img"
                    aria-labelledby="logoTitle"
                    class="kp"
                    viewBox="0 0 33 16"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <title id="logoTitle">Kevin Pruett "kp" logo</title>
                    <path
                        d="M4.95 8.447L2.172 11.27v3.93H0V0h2.171v8.49L10.423 0h2.475L6.406 6.84l6.905 8.36h-2.54L4.95 8.447zM26.214 0c1.969 0 3.517.47 4.647 1.411 1.129.941 1.693 2.237 1.693 3.887s-.564 2.946-1.693 3.887c-1.13.941-2.678 1.412-4.647 1.412h-3.757V15.2h-2.171V0h5.928zm-.065 8.707c1.375 0 2.424-.29 3.148-.868.724-.594 1.086-1.44 1.086-2.54s-.362-1.94-1.086-2.52c-.724-.593-1.773-.89-3.148-.89h-3.692v6.818h3.692z"
                    />
                </svg>
            </header>
            <main>
                I <strong>write software</strong> and <strong>design interfaces</strong> to amplify the human
                experience. <i>I believe</i> in automating tedium in exchange for
                creativity. <i>I am hopeful</i> in the role technology can play in
                aiding our ability to make better decisions.
            </main>
            <ul class="links">
                <li><a href="https://twitter.com/pruett">Twitter</a></li>
                <li><a href="https://github.com/pruett">GitHub</a></li>
                <li><a href="https://linkedin.com/in/pruett">LinkedIn</a></li>
            </ul>
        </div>
    </body>
</html>
